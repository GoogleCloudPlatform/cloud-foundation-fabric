# yaml-language-server: $schema=../../schemas/pubsub.schema.json

# Topic for application events.

project_id: $project_ids:app-project
labels:
  environment: dev
message_retention_duration: 86400s
subscriptions:
  app-events-sub:
    ack_deadline_seconds: 30
    message_retention_duration: 604800s
    retry_policy:
      minimum_backoff: 10
      maximum_backoff: 600
  app-events-bq:
    bigquery:
      table: $project_ids:app-project.app_dataset.events
      write_metadata: true
