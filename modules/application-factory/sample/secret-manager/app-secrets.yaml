# yaml-language-server: $schema=../../schemas/secret-manager.schema.json

# Secrets for the application.

project_id: $project_ids:app-project
secrets:
  db-password:
    labels:
      environment: dev
    iam:
      roles/secretmanager.secretAccessor:
        - $iam_principals:app-sa
    versions:
      latest:
        data: changeme
  api-key:
    labels:
      environment: dev
    iam:
      roles/secretmanager.secretAccessor:
        - $iam_principals:app-sa
        - $iam_principals:ci-sa
