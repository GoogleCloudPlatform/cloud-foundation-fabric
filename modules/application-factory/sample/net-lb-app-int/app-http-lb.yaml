# yaml-language-server: $schema=../../schemas/net-lb-app-int.schema.json

# Internal HTTP load balancer for application traffic.

project_id: $project_ids:app-project
region: europe-west1
protocol: HTTP
vpc_config:
  network: projects/net-project/global/networks/app-vpc
  subnetwork: projects/net-project/regions/europe-west1/subnetworks/proxy-subnet
backend_service_configs:
  default:
    backends:
      - group: instance-group-self-link
    health_checks:
      - default
    port_name: http
health_check_configs:
  default:
    http:
      port: 8080
      request_path: /healthz
urlmap_config:
  default_service: default
