# yaml-language-server: $schema=../../schemas/net-lb-int.schema.json

# Internal TCP load balancer for application traffic.

project_id: $project_ids:app-project
region: europe-west1
vpc_config:
  network: projects/net-project/global/networks/app-vpc
  subnetwork: projects/net-project/regions/europe-west1/subnetworks/app-subnet
backends:
  - group: instance-group-self-link
forwarding_rules_config:
  "":
    ports:
      - "8080"
    protocol: TCP
health_check_config:
  tcp:
    port: 8080
