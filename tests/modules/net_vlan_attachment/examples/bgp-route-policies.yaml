values:
  google_compute_router.interconnect-router:
    bgp:
    - advertise_mode: CUSTOM
      advertised_groups:
      - ALL_SUBNETS
      advertised_ip_ranges:
      - description: ''
        range: 10.255.255.0/24
      - description: ''
        range: 192.168.255.0/24
      asn: 64514
      keepalive_interval: 20
    description: null
    encrypted_interconnect_router: null
    md5_authentication_keys: []
    name: interconnect-router
    network: mynet
    params: []
    project: myproject
    region: europe-west8
    timeouts: null
  module.example-va.google_compute_interconnect_attachment.default:
    admin_enabled: true
    bandwidth: BPS_10G
    candidate_cloud_router_ip_address: null
    candidate_cloud_router_ipv6_address: null
    candidate_customer_router_ip_address: null
    candidate_customer_router_ipv6_address: null
    candidate_subnets:
    - 169.254.0.0/29
    description: Example vlan attachment
    effective_labels:
      goog-terraform-provisioned: 'true'
    encryption: NONE
    interconnect: https://www.googleapis.com/compute/v1/projects/my-project/global/interconnects/interconnect-a
    ipsec_internal_addresses: null
    l2_forwarding: []
    labels: null
    mtu: '1500'
    name: vlan-attachment
    params: []
    project: myproject
    region: europe-west8
    router: interconnect-router
    subnet_length: null
    terraform_labels:
      goog-terraform-provisioned: 'true'
    timeouts: null
    type: DEDICATED
    vlan_tag8021q: 12345
  module.example-va.google_compute_router_interface.default[0]:
    name: vlan-attachment-intf
    private_ip_address: null
    project: myproject
    region: europe-west8
    router: interconnect-router
    subnetwork: null
    timeouts: null
    vpn_tunnel: null
  module.example-va.google_compute_router_peer.default[0]:
    advertise_mode: CUSTOM
    advertised_groups: null
    advertised_ip_ranges: []
    advertised_route_priority: null
    custom_learned_ip_ranges: []
    custom_learned_route_priority: null
    enable: true
    enable_ipv6: false
    export_policies:
    - export-policy
    import_policies:
    - import-rfc1918
    - import-drop-all
    interface: vlan-attachment-intf
    md5_authentication_key: []
    name: vlan-attachment-peer
    peer_asn: 65000
    project: myproject
    region: europe-west8
    router: interconnect-router
    router_appliance_instance: null
    timeouts: null
    zero_advertised_route_priority: null
    zero_custom_learned_route_priority: false
  module.example-va.google_compute_router_route_policy.default["export-policy"]:
    name: export-policy
    project: myproject
    region: europe-west8
    router: interconnect-router
    terms:
    - actions:
      - description: null
        expression: med.set(1000)
        location: null
        title: null
      match:
      - description: null
        expression: destination == '10.255.255.0/24'
        location: null
        title: null
      priority: 0
    timeouts: null
    type: ROUTE_POLICY_TYPE_EXPORT
  module.example-va.google_compute_router_route_policy.default["import-drop-all"]:
    name: import-drop-all
    project: myproject
    region: europe-west8
    router: interconnect-router
    terms:
    - actions:
      - description: null
        expression: drop()
        location: null
        title: null
      match:
      - description: Drop all the routes not accepted above
        expression: destination.inAnyRange(prefix('0.0.0.0/0').orLonger())
        location: null
        title: default-drop
      priority: 1
    timeouts: null
    type: ROUTE_POLICY_TYPE_IMPORT
  module.example-va.google_compute_router_route_policy.default["import-rfc1918"]:
    name: import-rfc1918
    project: myproject
    region: europe-west8
    router: interconnect-router
    terms:
    - actions:
      - description: null
        expression: accept()
        location: null
        title: null
      match:
      - description: Accept the 3 RFC1918 subnets.
        expression: destination == '10.0.0.0/8' || destination == '172.16.0.0/12'
          || destination == '192.168.0.0/16'
        location: null
        title: import-rfc1918-subnets
      priority: 1
    timeouts: null
    type: ROUTE_POLICY_TYPE_IMPORT
  module.example-va.random_id.secret:
    byte_length: 12
    keepers: null
    prefix: null

counts:
  google_compute_interconnect_attachment: 1
  google_compute_router: 1
  google_compute_router_interface: 1
  google_compute_router_peer: 1
  google_compute_router_route_policy: 3
  modules: 1
  random_id: 1
  resources: 8

outputs: {}
