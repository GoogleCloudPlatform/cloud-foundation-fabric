values:
  google_sql_database_instance.primary:
    database_version: POSTGRES_13
    encryption_key_name: projects/myprj/locations/europe-west8/keyRings/mykr/cryptoKeys/mykey
    name: db-test
    project: my-project
    region: europe-west8
    settings:
    - insights_config:
      - enhanced_query_insights_enabled: true
        query_insights_enabled: true
        query_plans_per_minute: 10
        query_string_length: 2048
        record_application_tags: true
        record_client_address: true
      ip_configuration:
      - ipv4_enabled: false
        private_network: projects/myprj/global/networks/myvpc
        psc_config:
        - allowed_consumer_projects:
          - my-project
          psc_enabled: true

counts:
  google_sql_database_instance: 1
  modules: 0
  resources: 1
