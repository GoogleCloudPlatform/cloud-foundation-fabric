# yaml-language-server: $schema=../../../../schemas/custom-constraint.schema.json

# Born-with-it constraints (design §2/§7): Cloud SQL cannot add these to an
# existing instance, so they're enforced from the first instance created.
# Cherry-picked from the hardened dataset; enforcement rules (scoped where
# noted) live in ../org-policies/sql.yaml.

custom.cloudsqlRequirePointInTimeRecovery:
  action_type: DENY
  condition: |-
    (resource.databaseVersion.contains("POSTGRES")
      || resource.databaseVersion.contains("SQLSERVER"))
      && resource.settings.backupConfiguration.pointInTimeRecoveryEnabled == false
  description: Ensure that Cloud SQL instance is configure enable point in time recovery
    in the backup configuration. This setting is possibly for Postgres and SQLServer
    databases.
  display_name: Require Cloud SQL instances to enable point in time recovery
  method_types:
  - CREATE
  - UPDATE
  resource_types:
  - sqladmin.googleapis.com/Instance

custom.cloudsqlRequireSSLConnection:
  action_type: DENY
  condition: |-
    resource.settings.ipConfiguration.sslMode in ['ENCRYPTED_ONLY', 'TRUSTED_CLIENT_CERTIFICATE_REQUIRED'] == false
  description: Ensure that Cloud SQL instance is configured to allow only connections
    that are encrypted with SSL/TLS
  display_name: Require Cloud SQL instances to allow only connections that are encrypted
    with SSL/TLS
  method_types:
  - CREATE
  - UPDATE
  resource_types:
  - sqladmin.googleapis.com/Instance

# Doubles instance cost (design §11), so enforcement (org-policies/sql.yaml) is
# scoped to the `production` environment tag rather than applied org-wide.
custom.cloudsqlRequireHighAvailability:
  action_type: DENY
  condition: |-
    resource.settings.availabilityType != "REGIONAL"
  description: Ensure that Cloud SQL instance is configured with high availability
  display_name: Require Cloud SQL instances to be configured with high availability
  method_types:
  - CREATE
  - UPDATE
  resource_types:
  - sqladmin.googleapis.com/Instance
