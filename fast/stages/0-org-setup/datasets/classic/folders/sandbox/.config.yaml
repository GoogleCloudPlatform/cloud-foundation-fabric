# yaml-language-server: $schema=../../../../schemas/folder.schema.json

# Sandbox: experimentation folder (design §3 / §7). Relaxed, *targeted and documented*
# org-policy exceptions are permitted here — never in Production. The hard budget cap is
# applied to sandbox projects by the project factory (2-project-factory), since GCP budgets
# are scoped to projects. Managed by the project-factory service accounts, like Teams.
name: Sandbox
iam_by_principals:
  $iam_principals:service_accounts/iac-0/iac-pf-rw:
    - roles/owner
    - roles/resourcemanager.folderAdmin
    - roles/resourcemanager.projectCreator
    - roles/resourcemanager.tagUser
    - $custom_roles:service_project_network_admin
  $iam_principals:service_accounts/iac-0/iac-pf-ro:
    - roles/viewer
    - roles/resourcemanager.folderViewer
    - roles/resourcemanager.tagViewer
tag_bindings:
  context: $tag_values:context/project-factory
# Targeted relaxations go here, PR-reviewed, one constraint at a time as concrete needs arise.
# Example (commented until needed) — allow external IPs for a networking experiment:
# org_policies:
#   compute.vmExternalIpAccess:
#     rules:
#       - allow:
#           all: true
