# yaml-language-server: $schema=../../../../../schemas/project.schema.json

services:
  - bigquery.googleapis.com
  - cloudaicompanion.googleapis.com
  - cloudresourcemanager.googleapis.com
  - composer.googleapis.com
  - datacatalog.googleapis.com
  - dataplex.googleapis.com
  - datalineage.googleapis.com
  - storage.googleapis.com

iam_by_principals:
  $iam_principals:dp-product-0-dev:
    - roles/dataplex.catalogEditor
    - roles/bigquery.dataOwner
    - roles/bigquery.jobUser
    - roles/datalineage.viewer
    - roles/dataplex.dataScanCreator
    - roles/logging.viewer
    - roles/monitoring.viewer
    - roles/serviceusage.serviceUsageViewer
    - roles/storage.bucketViewer
    - roles/storage.objectAdmin
  $iam_principals:dp-admin:
    - roles/editor

service_accounts:
  processing:
    display_name: Processing service account.
    iam_self_roles: []

datasets:
  exposure:
    friendly_name: Exposure Dataset
    # IAM for datasets is not currently supported by project-factory integration
    # iam:
    #   "roles/bigquery.dataViewer":
    #     - $iam_principals:data-consumer-bi

buckets:
  exposed:
    description: Exposed Bucket
    iam:
      roles/storage.objectViewer:
        - $iam_principals:data-consumer-bi
      roles/storage.bucketViewer:
        - $iam_principals:data-consumer-bi
