# yaml-language-server: $schema=../../../schemas/project.schema.json

parent: $folder_ids:data-platform-dev
labels:
  environment: dev
iam_by_principals:
  $iam_principals:dp-admin:
    - roles/datacatalog.categoryAdmin
    - roles/dataplex.catalogAdmin
    - roles/dataplex.aspectTypeOwner
    - roles/resourcemanager.tagViewer
  $iam_principals:dp-domain-0-admin:
    - roles/datacatalog.viewer
    - roles/dataplex.aspectTypeUser
  $iam_principals:dp-product-0-dev:
    - roles/datacatalog.viewer
    - roles/dataplex.aspectTypeUser
factories_config:
  tags: ../tags/data-core-0
# the following assumes keys are centrally managed via the security stage
service_encryption_key_ids:
  storage.googleapis.com:
    - $kms_keys:storage-dev-primary
  bigquery.googleapis.com:
    - $kms_keys:storage-dev-primary
