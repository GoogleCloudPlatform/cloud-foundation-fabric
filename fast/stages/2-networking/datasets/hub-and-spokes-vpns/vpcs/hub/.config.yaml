# yaml-language-server: $schema=../../../../schemas/vpc.schema.json

project_id: $project_ids:net-core-0
name: hub-0
delete_default_routes_on_create: true
nat_config:
  nat-ew8:
    region: $locations:primary
routers:
  vpn-router:
    region: $locations:primary
    asn: 64514
    custom_advertise:
      ip_ranges:
        "10.0.0.0/8": "rfc1918-10"
        "172.16.0.0/12": "rfc1918-172"
        "192.168.0.0/16": "rfc1918-192"
  hybrid-connectivity-router:
    region: $locations:primary
    asn: 64515
    custom_advertise:
      ip_ranges:
        "10.0.0.0/8": "rfc1918-10"
        "172.16.0.0/12": "rfc1918-172"
        "192.168.0.0/16": "rfc1918-192"
routes:
  default:
    dest_range: 0.0.0.0/0
    next_hop_type: "gateway"
    next_hop: "default-internet-gateway"
factories_config:
  vlan_attachments: "none"
